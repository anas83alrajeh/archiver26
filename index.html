<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الأرشفة الذكي — Smart Archiving</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
<!-- Tesseract.js for free local OCR (Arabic + English) -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
:root{
  --ink:#14241f; --paper:#f4efe6; --paper-2:#ece4d6;
  --accent:#2f6b4f; --accent-2:#c9a14a; --accent-deep:#1d4a36;
  --danger:#b3402f; --muted:#6b7a72; --line:#d6cdba;
  --card:#fbf8f1; --shadow:0 8px 30px rgba(20,36,31,.10);
  --radius:14px; --font-ar:'IBM Plex Sans Arabic',system-ui,sans-serif;
  --font-display:'Cairo',sans-serif; --font-en:'Fraunces',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-ar); background:var(--paper);
  color:var(--ink); line-height:1.6; min-height:100vh;
  background-image:
    radial-gradient(circle at 12% 18%, rgba(47,107,79,.06), transparent 40%),
    radial-gradient(circle at 88% 82%, rgba(201,161,74,.07), transparent 40%);
}
[dir="ltr"]{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif}
.app{display:flex;flex-direction:column;min-height:100vh}

/* ---- Header ---- */
header{
  background:linear-gradient(135deg,var(--accent-deep),var(--accent));
  color:#f4efe6; padding:18px 26px; display:flex; align-items:center;
  justify-content:space-between; box-shadow:var(--shadow); position:sticky; top:0; z-index:50;
  border-bottom:3px solid var(--accent-2);
}
.brand{display:flex;align-items:center;gap:14px}
.brand .logo{
  width:44px;height:44px;border-radius:12px;background:var(--accent-2);
  display:grid;place-items:center;font-family:var(--font-display);font-weight:900;
  color:var(--accent-deep);font-size:22px;box-shadow:inset 0 -3px 0 rgba(0,0,0,.15)
}
.brand h1{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:-.3px}
.brand .sub{font-size:12px;opacity:.85;font-weight:400}
.head-actions{display:flex;align-items:center;gap:10px}
.lang-toggle{
  display:flex;background:rgba(255,255,255,.13);border-radius:10px;padding:3px;gap:2px
}
.lang-toggle button{
  border:0;background:transparent;color:#f4efe6;padding:6px 14px;border-radius:8px;
  cursor:pointer;font-family:inherit;font-weight:600;font-size:13px;transition:.2s
}
.lang-toggle button.active{background:var(--accent-2);color:var(--accent-deep)}

/* ---- Layout ---- */
.shell{display:flex;flex:1;min-height:0}
nav.side{
  width:230px;background:var(--card);border-inline-end:1px solid var(--line);
  padding:18px 12px;display:flex;flex-direction:column;gap:4px;flex-shrink:0
}
nav.side button{
  display:flex;align-items:center;gap:12px;border:0;background:transparent;
  padding:12px 14px;border-radius:10px;cursor:pointer;font-family:inherit;
  font-size:15px;font-weight:600;color:var(--muted);text-align:start;transition:.2s;width:100%
}
nav.side button:hover{background:var(--paper-2);color:var(--ink)}
nav.side button.active{background:var(--accent);color:#f4efe6;box-shadow:var(--shadow)}
nav.side .ico{font-size:18px;width:22px;text-align:center}
nav.side .spacer{flex:1}
.storage-chip{
  font-size:11.5px;padding:10px;border-radius:10px;background:var(--paper-2);
  color:var(--muted);line-height:1.5;border:1px dashed var(--line)
}
.storage-chip b{color:var(--accent-deep)}

main{flex:1;padding:28px 32px;overflow:auto}
.page{display:none;animation:fade .35s ease}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.page-title{font-family:var(--font-display);font-size:26px;font-weight:700;margin-bottom:6px;color:var(--accent-deep)}
.page-desc{color:var(--muted);margin-bottom:24px;font-size:14.5px}

/* ---- Cards / common ---- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);margin-bottom:20px}
.card h3{font-family:var(--font-display);font-size:17px;color:var(--accent-deep);margin-bottom:14px;display:flex;align-items:center;gap:8px}
label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px}
input,select,textarea{
  width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;
  font-family:inherit;font-size:14px;background:var(--paper);color:var(--ink);transition:.2s
}
input:focus,select:focus,textarea:focus{outline:0;border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,107,79,.12)}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>*{flex:1;min-width:140px}
.btn{
  border:0;border-radius:10px;padding:11px 20px;font-family:inherit;font-weight:700;
  font-size:14px;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:8px
}
.btn-primary{background:var(--accent);color:#f4efe6}
.btn-primary:hover{background:var(--accent-deep)}
.btn-gold{background:var(--accent-2);color:var(--accent-deep)}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
.btn-ghost:hover{background:var(--paper-2)}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:7px 13px;font-size:12.5px}

/* ---- Field builder ---- */
.field-row{display:flex;gap:10px;align-items:flex-end;margin-bottom:10px;padding:12px;background:var(--paper);border-radius:10px;border:1px solid var(--line)}
.field-row>div{flex:1}
.field-row .chk{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding-bottom:11px}
.field-row .chk input{width:auto}
.field-row .del{flex:0 0 auto}

/* ---- Template cards ---- */
.tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.tpl-card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px;transition:.2s;border-inline-start:4px solid var(--accent-2)}
.tpl-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.tpl-card h4{font-family:var(--font-display);font-size:16px;color:var(--accent-deep);margin-bottom:4px}
.tpl-card .meta{font-size:12px;color:var(--muted);margin-bottom:10px}
.tag{display:inline-block;background:var(--paper-2);color:var(--muted);font-size:11px;padding:3px 9px;border-radius:20px;margin:2px}

/* ---- Scan / verify split ---- */
.split{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.split .pane{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px;min-height:300px}
.dropzone{
  border:2px dashed var(--line);border-radius:12px;padding:40px 20px;text-align:center;
  cursor:pointer;transition:.2s;color:var(--muted)
}
.dropzone:hover,.dropzone.drag{border-color:var(--accent);background:rgba(47,107,79,.04);color:var(--accent-deep)}
.dropzone .big{font-size:40px;margin-bottom:8px}
.preview-img{max-width:100%;border-radius:10px;border:1px solid var(--line)}
.scan-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px}
.badge-free{background:rgba(47,107,79,.15);color:var(--accent-deep)}
.badge-paid{background:rgba(201,161,74,.2);color:#7a5e1a}
.kv{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.kv .pair label{font-size:12px;color:var(--muted)}

/* ---- Table ---- */
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{padding:11px 12px;text-align:start;border-bottom:1px solid var(--line)}
th{font-family:var(--font-display);color:var(--accent-deep);font-size:13px;background:var(--paper)}
tr:hover td{background:var(--paper)}
.empty{text-align:center;padding:50px;color:var(--muted)}
.empty .big{font-size:46px;opacity:.4;margin-bottom:10px}

/* ---- Toast & modal ---- */
.toast{
  position:fixed;bottom:24px;inset-inline-end:24px;background:var(--accent-deep);color:#f4efe6;
  padding:14px 20px;border-radius:12px;box-shadow:var(--shadow);z-index:200;
  font-weight:600;font-size:14px;transform:translateY(120px);transition:.35s;max-width:340px
}
.toast.show{transform:none}
.toast.err{background:var(--danger)}
.modal-bg{position:fixed;inset:0;background:rgba(20,36,31,.55);display:none;place-items:center;z-index:150;padding:20px;backdrop-filter:blur(3px)}
.modal-bg.show{display:grid}
.modal{background:var(--card);border-radius:16px;padding:26px;max-width:460px;width:100%;box-shadow:var(--shadow);animation:fade .3s}
.modal h3{font-family:var(--font-display);color:var(--accent-deep);margin-bottom:8px}
.modal p{color:var(--muted);font-size:14px;margin-bottom:16px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.progress{height:6px;background:var(--paper-2);border-radius:6px;overflow:hidden;margin-top:10px}
.progress .bar{height:100%;background:var(--accent);width:0;transition:.3s}
.muted{color:var(--muted);font-size:13px}
.spinner{width:18px;height:18px;border:2.5px solid rgba(244,239,230,.4);border-top-color:#f4efe6;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:820px){
  .shell{flex-direction:column} nav.side{width:auto;flex-direction:row;overflow-x:auto}
  nav.side .spacer,.storage-chip{display:none} .split{grid-template-columns:1fr} main{padding:18px}
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modalContent"></div></div>

const t = k => (I18N[LANG][k] ?? k);

/* ---------------- 2) طبقة التخزين ---------------- */
// IndexedDB: المخزن الأساسي. يحفظ المستندات والقوالب والصور (Blobs).
const DB_NAME="smart_dms", DB_VER=1;
let _db=null, _dirHandle=null;

function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains("templates")) db.createObjectStore("templates",{keyPath:"id"});
      if(!db.objectStoreNames.contains("documents")) db.createObjectStore("documents",{keyPath:"id"});
      if(!db.objectStoreNames.contains("images")) db.createObjectStore("images",{keyPath:"id"});
      if(!db.objectStoreNames.contains("meta")) db.createObjectStore("meta",{keyPath:"k"});
    };
    r.onsuccess=e=>{_db=e.target.result;res(_db)};
    r.onerror=e=>rej(e.target.error);
  });
}
function tx(store,mode="readonly"){return _db.transaction(store,mode).objectStore(store);}
function idbGetAll(store){return new Promise((res,rej)=>{const r=tx(store).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function idbGet(store,key){return new Promise((res,rej)=>{const r=tx(store).get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function idbPut(store,val){return new Promise((res,rej)=>{const r=tx(store,"readwrite").put(val);r.onsuccess=()=>res(val);r.onerror=()=>rej(r.error);});}
function idbDel(store,key){return new Promise((res,rej)=>{const r=tx(store,"readwrite").delete(key);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}
function metaGet(k){return idbGet("meta",k).then(v=>v?v.v:null);}
function metaSet(k,v){return idbPut("meta",{k,v});}

/* ---------------- 3) محرك الاستخراج الهجين ---------------- */
const OCR_CONF_THRESHOLD = 70; // عتبة الثقة للقراءة المجانية

// تحسين الصورة على Canvas (تدرّج رمادي + تباين) — بديل خفيف لـ OpenCV في المتصفح
function enhanceImage(img){
  const c=document.createElement("canvas");
  const scale=Math.min(1, 1600/Math.max(img.width,img.height));
  c.width=img.width*scale; c.height=img.height*scale;
  const ctx=c.getContext("2d");
  ctx.drawImage(img,0,0,c.width,c.height);
  const d=ctx.getImageData(0,0,c.width,c.height), p=d.data;
  for(let i=0;i<p.length;i+=4){
    let g=0.3*p[i]+0.59*p[i+1]+0.11*p[i+2];
    g=(g-128)*1.35+128;             // رفع التباين
    g=Math.max(0,Math.min(255,g));
    p[i]=p[i+1]=p[i+2]=g;
  }
  ctx.putImageData(d,0,0);
  return c;
}

// قراءة محلية مجانية عبر Tesseract.js (عربي + إنجليزي)
async function localOCR(canvas, onProgress){
  const {data}=await Tesseract.recognize(canvas,"ara+eng",{
    logger:m=>{ if(m.status==="recognizing text" && onProgress) onProgress(m.progress); }
  });
  return {text:data.text||"", confidence:data.confidence||0};
}

// تنظيف قيمة مفردة حسب نوع الحقل
function coerceVal(val, type){
  if(val==null) return null;
  val=String(val).trim();
  if(!val) return null;
  if(type==="number"){const n=val.match(/-?\d[\d.,]*/);return n?parseFloat(n[0].replace(/,/g,"")):null;}
  if(type==="date"){const dm=val.match(/\d{1,4}[-/.]\d{1,2}[-/.]\d{1,4}/);return dm?dm[0]:val;}
  return val;
}

// تعيين النص المستخرج على حقول القالب — يُرجع مصفوفة صفوف (كل سطر = سجل)
function mapFields(text, fields){
  const lines=text.split(/\n/).map(l=>l.trim()).filter(Boolean);
  const rows=[];
  for(const line of lines){
    // تقسيم السطر إلى خلايا حسب الفواصل أو المسافات المتعددة
    const cells=line.split(/\s{2,}|\t|[|｜]/).map(c=>c.trim()).filter(Boolean);
    if(cells.length<2) continue;              // تجاهل أسطر العناوين أو الأسطر الفارغة
    const row={};
    let hasData=false;
    fields.forEach((f,i)=>{
      const v=coerceVal(cells[i], f.type);
      row[f.name]=v;
      if(v!=null) hasData=true;
    });
    if(hasData) rows.push(row);
  }
  // إن لم نتمكن من تقسيم صفوف، نرجع صفًّا واحدًا بالطريقة القديمة
  if(rows.length===0){
    const out={};
    for(const f of fields){
      const re=new RegExp(f.name.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\s*[:：\\-]?\\s*(.+)","i");
      const m=text.match(re);
      out[f.name]=coerceVal(m?m[1].split(/\n/)[0]:null, f.type);
    }
    return [out];
  }
  return rows;
}

// أسعار النموذج (دولار لكل مليون توكن) لتقدير التكلفة — gpt-4o
const MODEL_PRICE={input:2.5, output:10.0}; // USD / 1M tokens

// المسار المدفوع: OpenRouter Vision (يُستخدم مفتاح المستخدم من جهازه فقط)
// يُرجع {rows:[...], costCents:number}
async function visionOCR(dataUrl, fields, apiKey){
  const schema={}; fields.forEach(f=>schema[f.name]=`${f.type} or null`);
  const body={
    model:"openai/gpt-4o",
    messages:[
      {role:"system",content:"You extract structured data from an image of a document or table. The image may contain MULTIPLE rows/records. Extract EVERY row. Map each row's cells to the provided JSON keys. Do not hallucinate; if a cell is missing or unreadable use null. Respond with ONLY a valid JSON object of the exact form {\"rows\":[ {<keys>}, ... ]}. One object per row."},
      {role:"user",content:[
        {type:"text",text:"JSON keys for each row: "+JSON.stringify(schema)+'. Return {"rows":[...]} with one object per detected row.'},
        {type:"image_url",image_url:{url:dataUrl}}
      ]}
    ],
    temperature:0, response_format:{type:"json_object"},
    usage:{include:true}
  };
  const r=await fetch("https://openrouter.ai/api/v1/chat/completions",{
    method:"POST",
    headers:{"Authorization":"Bearer "+apiKey,"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  if(!r.ok) throw new Error("openrouter "+r.status);
  const j=await r.json();
  let c=j.choices[0].message.content.trim().replace(/^```json?|```$/g,"").trim();
  const parsed=JSON.parse(c);
  let rowsRaw=Array.isArray(parsed)?parsed:(parsed.rows||parsed.data||[parsed]);
  if(!Array.isArray(rowsRaw)) rowsRaw=[rowsRaw];
  const rows=rowsRaw.map(rw=>{
    const out={}; fields.forEach(f=>out[f.name]=coerceVal(rw[f.name], f.type)); return out;
  }).filter(rw=>fields.some(f=>rw[f.name]!=null));

  // حساب التكلفة بالسنتات
  let costCents=null;
  const u=j.usage||{};
  if(u.cost!=null){                                  // OpenRouter يرجع التكلفة الفعلية بالدولار أحياناً
    costCents=Math.round(u.cost*100*1000)/1000;
  }else if(u.prompt_tokens!=null||u.completion_tokens!=null){
    const inC=(u.prompt_tokens||0)/1e6*MODEL_PRICE.input;
    const outC=(u.completion_tokens||0)/1e6*MODEL_PRICE.output;
    costCents=Math.round((inC+outC)*100*1000)/1000;  // 3 منازل عشرية للسنت
  }
  return {rows, costCents};
}

// تصدير الأرشيف (المفلتر) إلى Excel — صيغة Excel XML بسيطة تفتح مباشرة

  let rows="";

  downloadBlob(new Blob(['\ufeff'+html],{type:"application/vnd.ms-excel"}),"archive.xls");
}

  try{

    const {text,confidence}=await localOCR(canvas,p=>{document.getElementById("bar").style.width=(20+p*60)+"%";});

    if(confidence>=OCR_CONF_THRESHOLD){

    }else{
      // الرجوع للمدفوع

      if(!key){

    console.error(err);

async function addScanRow(){
  const tpls=await idbGetAll("templates");const tpl=tpls.find(x=>x.id===STATE.scan.templateId);
  STATE.scan.result.rows=collectScanRows(tpl);
  const empty={}; tpl.fields.forEach(f=>empty[f.name]=null);
  STATE.scan.result.rows.push(empty);
  render();
}
async function rmScanRow(i){
  const tpls=await idbGetAll("templates");const tpl=tpls.find(x=>x.id===STATE.scan.templateId);
  STATE.scan.result.rows=collectScanRows(tpl);
  STATE.scan.result.rows.splice(i,1);
  render();
}

async function saveDoc(){
  const s=STATE.scan;
  const tpls=await idbGetAll("templates");
  const tpl=tpls.find(x=>x.id===s.templateId);
  const rows=collectScanRows(tpl).filter(row=>tpl.fields.some(f=>row[f.name]));
  if(rows.length===0){toast(t('no_rows'),true);return;}
  // صورة واحدة مشتركة لكل الصفوف (المصدر نفسه)
  const imgId=uid();
  await idbPut("images",{id:imgId,dataUrl:s.dataUrl});
  if(_dirHandle){
    const blob=await (await fetch(s.dataUrl)).blob();
    await writeToFolder("images/"+imgId+".png",blob).catch(()=>{});
  }
  const now=new Date().toISOString();
  const costPer = (s.result.scanType==="Paid" && s.result.costCents!=null)
    ? Math.round((s.result.costCents/rows.length)*1000)/1000 : 0;
  for(const data of rows){
    const id=uid();
    const doc={id,templateId:tpl.id,title:data[tpl.fields[0].name]||tpl.name,
      scanType:s.result.scanType,data,createdAt:now,imageId:imgId,costCents:costPer};
    await idbPut("documents",doc);
  }
  if(_dirHandle) await syncToFolder();
  toast(rows.length+" — "+t('saved_ok'));
  STATE.scan={img:null,dataUrl:null,result:null,templateId:s.templateId};
  go('archive');
}

/* ----- صفحة الأرشيف ----- */
async function renderArchive(m){
  const tpls=await idbGetAll("templates");
  let docs=await idbGetAll("documents");
  docs.sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
  const f=STATE.filter;
  let view=docs.filter(d=>{
    if(f.tpl && d.templateId!==f.tpl) return false;
    if(f.q){const blob=JSON.stringify(d.data).toLowerCase()+" "+(d.title||"").toLowerCase();if(!blob.includes(f.q.toLowerCase()))return false;}
    return true;
  });
  const tplName=id=>(tpls.find(x=>x.id===id)||{}).name||"—";
  m.innerHTML=`
    <div class="page active">
      <div class="page-title">${t('archive_title')}</div>
      <div class="page-desc">${t('archive_desc')}</div>
      <div class="card">
        <div class="row" style="align-items:flex-end">
          <div style="flex:2"><label>🔎</label><input id="fq" placeholder="${t('search_ph')}" value="${esc(f.q)}"></div>
          <div><label>${t('col_template')}</label>
            <select id="ftpl"><option value="">${t('filter_all')}</option>
            ${tpls.map(tp=>`<option value="${tp.id}" ${f.tpl===tp.id?'selected':''}>${esc(tp.name)}</option>`).join("")}</select></div>
          <div style="flex:0"><label>&nbsp;</label><button class="btn btn-gold" onclick="doExcel()">📊 ${t('export_excel')}</button></div>
        </div>
      </div>
      <div class="card">
        ${view.length===0?`<div class="empty"><div class="big">🗄️</div>${t('no_docs')}</div>`:`
        <table><thead><tr>
          <th>${t('col_title')}</th><th>${t('col_template')}</th><th>${t('col_type')}</th><th>${t('col_cost')}</th><th>${t('col_date')}</th><th>${t('col_actions')}</th>
        </tr></thead><tbody>
        ${view.map(d=>`<tr>
          <td><b>${esc(d.title||'—')}</b></td>
          <td>${esc(tplName(d.templateId))}</td>
          <td>${d.scanType==='Paid'?`<span class="scan-badge badge-paid">💎 ${t('type_paid')}</span>`:`<span class="scan-badge badge-free">🆓 ${t('type_free')}</span>`}</td>
          <td class="muted">${d.scanType==='Paid'&&d.costCents!=null?`${d.costCents} ${t('cents')}`:'—'}</td>
          <td class="muted">${new Date(d.createdAt).toLocaleDateString()}</td>
          <td>
            <button class="btn btn-ghost btn-sm" onclick="viewDoc('${d.id}')">${t('view')}</button>
            <button class="btn btn-danger btn-sm" onclick="delDoc('${d.id}')">${t('del')}</button>
          </td>
        </tr>`).join("")}
        </tbody></table>`}
      </div>
    </div>`;
  const fq=document.getElementById("fq");
  fq.oninput=()=>{f.q=fq.value;clearTimeout(fq._t);fq._t=setTimeout(()=>renderArchive(m),250);};
  document.getElementById("ftpl").onchange=e=>{f.tpl=e.target.value;renderArchive(m);};
}
async function doExcel(){
  const tpls=await idbGetAll("templates");let docs=await idbGetAll("documents");
  const f=STATE.filter;
  docs=docs.filter(d=>(!f.tpl||d.templateId===f.tpl)&&(!f.q||JSON.stringify(d.data).toLowerCase().includes(f.q.toLowerCase())));
  exportExcel(docs,tpls);
}
async function viewDoc(id){
  const d=await idbGet("documents",id);const im=await idbGet("images",d.imageId);
  const tpls=await idbGetAll("templates");const tpl=tpls.find(x=>x.id===d.templateId);
  modal(`<h3>${esc(d.title||'')}</h3>
    <div class="split" style="grid-template-columns:1fr 1fr;gap:14px">
      <div>${im?`<img src="${im.dataUrl}" class="preview-img">`:''}</div>
      <div class="kv">${(tpl?tpl.fields:Object.keys(d.data).map(k=>({name:k}))).map(fl=>`
        <div class="pair"><label>${esc(fl.name)}</label><div style="font-weight:600">${esc(d.data[fl.name]??t('empty_field'))}</div></div>`).join("")}</div>
    </div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">${t('close')}</button></div>`);
}
function delDoc(id){
  modal(`<h3>${t('del')}</h3><p>${t('confirm_del')}</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-danger" onclick="reallyDelDoc('${id}')">${t('confirm')}</button>
    </div>`);
}
async function reallyDelDoc(id){
  const d=await idbGet("documents",id);
  await idbDel("documents",id); if(d&&d.imageId)await idbDel("images",d.imageId);
  if(_dirHandle)await syncToFolder();
  closeModal();toast(t('deleted'));render();
}

/* ----- صفحة القوالب ----- */
async function renderTemplates(m){
  const tpls=await idbGetAll("templates");
  m.innerHTML=`
    <div class="page active">
      <div class="page-title">${t('tpl_title')}</div>
      <div class="page-desc">${t('tpl_desc')}</div>
      <button class="btn btn-primary" style="margin-bottom:18px" onclick="editTemplate()">➕ ${t('new_tpl')}</button>
      ${tpls.length===0?`<div class="card"><div class="empty"><div class="big">📋</div>${t('no_templates')}</div></div>`:`
      <div class="tpl-grid">
        ${tpls.map(tp=>`<div class="tpl-card">
          <h4>${esc(tp.name)}</h4>
          <div class="meta">${tp.fields.length} ${t('fields_count')}</div>
          <div>${tp.fields.slice(0,5).map(fl=>`<span class="tag">${esc(fl.name)}</span>`).join("")}</div>
          <div style="margin-top:12px;display:flex;gap:6px">
            <button class="btn btn-ghost btn-sm" onclick="editTemplate('${tp.id}')">${t('edit')}</button>
            <button class="btn btn-danger btn-sm" onclick="delTpl('${tp.id}')">${t('del')}</button>
          </div>
        </div>`).join("")}
      </div>`}
    </div>`;
}
function editTemplate(id){
  STATE.editTpl=id?null:{name:"",fields:[{name:"",type:"string",required:false}]};
  if(id){idbGet("templates",id).then(tp=>{STATE.editTpl=JSON.parse(JSON.stringify(tp));showTplModal();});}
  else showTplModal();
}
function showTplModal(){
  const e=STATE.editTpl;
  modal(`<h3>${e.id?t('edit'):t('new_tpl')}</h3>
    <label>${t('tpl_name')}</label>
    <input id="tplName" placeholder="${t('tpl_name_ph')}" value="${esc(e.name)}">
    <label style="margin-top:14px">${t('tpl_fields')}</label>
    <div id="fieldList">${e.fields.map((f,i)=>fieldRow(f,i)).join("")}</div>
    <button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="addField()">➕ ${t('add_field')}</button>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-primary" onclick="saveTpl()">${t('save_tpl')}</button>
    </div>`);
}
function fieldRow(f,i){
  return `<div class="field-row" data-i="${i}">
    <div><label>${t('field_name')}</label><input class="f-name" value="${esc(f.name)}"></div>
    <div style="flex:0 0 110px"><label>${t('field_type')}</label>
      <select class="f-type">
        <option value="string" ${f.type==='string'?'selected':''}>${t('t_string')}</option>
        <option value="number" ${f.type==='number'?'selected':''}>${t('t_number')}</option>
        <option value="date" ${f.type==='date'?'selected':''}>${t('t_date')}</option>
      </select></div>
    <div class="chk"><input type="checkbox" class="f-req" ${f.required?'checked':''}><label style="margin:0">${t('required')}</label></div>
    <div class="del"><button class="btn btn-danger btn-sm" onclick="rmField(${i})">✕</button></div>
  </div>`;
}
function collectFields(){
  const fields=[];
  document.querySelectorAll(".field-row").forEach(r=>{
    fields.push({name:r.querySelector(".f-name").value.trim(),type:r.querySelector(".f-type").value,required:r.querySelector(".f-req").checked});
  });
  return fields;
}
function addField(){STATE.editTpl.name=document.getElementById("tplName").value;STATE.editTpl.fields=collectFields();STATE.editTpl.fields.push({name:"",type:"string",required:false});showTplModal();}
function rmField(i){STATE.editTpl.name=document.getElementById("tplName").value;STATE.editTpl.fields=collectFields();STATE.editTpl.fields.splice(i,1);if(!STATE.editTpl.fields.length)STATE.editTpl.fields.push({name:"",type:"string",required:false});showTplModal();}
async function saveTpl(){
  const e=STATE.editTpl;
  e.name=document.getElementById("tplName").value.trim();
  e.fields=collectFields().filter(f=>f.name);
  if(!e.name||!e.fields.length){toast(t('tpl_need_name'),true);return;}
  if(!e.id)e.id=uid();
  await idbPut("templates",e);
  if(_dirHandle)await syncToFolder();
  closeModal();toast(t('tpl_saved'));render();
}
function delTpl(id){
  modal(`<h3>${t('del')}</h3><p>${t('confirm_del_tpl')}</p>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
    <button class="btn btn-danger" onclick="reallyDelTpl('${id}')">${t('confirm')}</button></div>`);
}
async function reallyDelTpl(id){await idbDel("templates",id);if(_dirHandle)await syncToFolder();closeModal();toast(t('tpl_deleted'));render();}

/* ----- صفحة الإعدادات ----- */
async function renderSettings(m){
  const key=await metaGet("openrouter_key");
  m.innerHTML=`
    <div class="page active">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
        <div>
          <div class="page-title">${t('set_title')}</div>
          <div class="page-desc">${t('set_desc')}</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="lockSettings()">🔒 ${t('lock')}</button>
      </div>
      <div class="card">
        <h3>💾 ${t('storage_section')}</h3>
        <p class="muted">${t('storage_explain')}</p>
        ${FS_SUPPORTED?`
          <div style="margin-top:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
            <button class="btn btn-primary" onclick="doLinkFolder()">📂 ${t('link_folder')}</button>
            ${_dirHandle?`<span class="muted">${t('folder_linked')} <b>${esc(_dirHandle.name)}</b></span>`:''}
          </div>`:`<div class="muted" style="margin-top:10px">⚠️ ${t('unsupported_fs')}</div>`}
      </div>

      <div class="card">
        <h3>🗂️ ${t('backup_section')}</h3>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-ghost" onclick="doExportBackup()">⬇️ ${t('export_backup')}</button>
          <button class="btn btn-ghost" onclick="document.getElementById('impFile').click()">⬆️ ${t('import_backup')}</button>
          <input type="file" id="impFile" accept=".json" style="display:none">
        </div>
      </div>

      <div class="card">
        <h3>💎 ${t('ai_section')}</h3>
        <p class="muted">${t('ai_explain')}</p>
        <div style="margin-top:12px">
          <span class="scan-badge ${key?'badge-free':'badge-paid'}">${key?t('key_set'):t('key_unset')}</span>
        </div>
        <div class="row" style="margin-top:12px;align-items:flex-end">
          <div style="flex:3"><label>${t('api_key')}</label><input id="apiKey" type="password" placeholder="${t('api_key_ph')}"></div>
          <div style="flex:0"><label>&nbsp;</label><button class="btn btn-primary" onclick="saveKey()">${t('save_key')}</button></div>
          ${key?`<div style="flex:0"><label>&nbsp;</label><button class="btn btn-danger" onclick="clearKey()">${t('clear_key')}</button></div>`:''}
        </div>
      </div>
      <div class="card">
        <h3>🔑 ${t('pw_section')}</h3>
        <p class="muted">${t('pw_explain')}</p>
        <div style="max-width:380px;margin-top:12px">
          <label>${t('pw_current')}</label>
          <input id="pwCur" type="password" placeholder="${t('pw_ph')}">
          <label style="margin-top:10px">${t('pw_new')}</label>
          <input id="pwNew" type="password">
          <label style="margin-top:10px">${t('pw_confirm')}</label>
          <input id="pwNew2" type="password">
          <button class="btn btn-primary" style="margin-top:14px" onclick="changePassword()">${t('pw_change')}</button>
        </div>
      </div>
    </div>`;
  imp.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    try{const obj=JSON.parse(await f.text());await importData(obj);if(_dirHandle)await syncToFolder();toast(t('import_done'));render();}
    catch(err){toast("Import error",true);}
  };
}
async function doLinkFolder(){
  try{const name=await linkFolder();await syncToFolder();toast(t('folder_ok')+": "+name);render();}
  catch(e){if(e.name!=="AbortError")toast("Folder error",true);}
}
async function doExportBackup(){
  const data=await exportData();
  downloadBlob(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}),"smart-dms-backup.json");
  toast(t('backup_done'));
}
async function saveKey(){
  const v=document.getElementById("apiKey").value.trim();
  if(!v)return; await metaSet("openrouter_key",v); toast(t('key_saved')); render();
}
async function clearKey(){await idbDel("meta","openrouter_key");toast(t('key_cleared'));render();}

function lockSettings(){STATE.settingsUnlocked=false;go('scan');}

async function changePassword(){
  const cur=document.getElementById("pwCur").value;
  const n1=document.getElementById("pwNew").value;
  const n2=document.getElementById("pwNew2").value;
  const real=await getSettingsPassword();
  if(cur!==real){toast(t('pw_current_wrong'),true);return;}
  if(n1.length<4){toast(t('pw_min'),true);return;}
  if(n1!==n2){toast(t('pw_mismatch'),true);return;}
  await metaSet("settings_password",n1);
  if(_dirHandle)await syncToFolder();
  toast(t('pw_changed'));render();
}

  render();
})();
</script>
